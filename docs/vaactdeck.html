<!DOCTYPE html>
<html lang="fr" data-theme="shinigami">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Decks VAACT — Atem</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/decks.css">

<script src="js/decks.js" defer></script>

<style>
.content { max-width: 900px; margin: auto; }
</style>

</head>

<body>

<div class="phdr">
  <h1 class="pttl">
    <span class="t1">Decks</span>
    <span class="t2">VAACT</span>
  </h1>

  <p class="psub">Explore les decks custom en version carte + recherche instant.</p>
</div>

<div class="content">

  <!-- 🔍 SEARCH -->
  <div class="search-box">
    <input id="searchInput" type="text" placeholder="🔍 Rechercher un duelliste..." autocomplete="off">
    <div id="suggestions"></div>
  </div>

  <!-- ⭐ FAVORIS -->
  <div class="fav-bar">
    <button id="showFavs">⭐ Mes favoris</button>
  </div>

  <!-- 🎴 DISPLAY -->
  <div id="deckDisplay" class="deck-display">
    <p class="placeholder">Recherche un duelliste pour afficher ses decks.</p>
  </div>

</div>
