<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decks VAACT — Atem</title>
<!-- empêcher le flash blanc aux changements de page : -->
<script>const t=localStorage.getItem('shinigami-theme');document.documentElement.setAttribute('data-theme',['shinigami','quincy'].includes(t)?t:'shinigami');</script>
<!-- no flash -->
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/decks.css">
<script src="js/nav.js" defer></script>
<script src="js/decks.js" defer></script>
</head>
<body>

<div class="atmo"></div>
<div class="top-bar"></div>

<div class="phdr">
  <h1 class="pttl">
    <span class="t1">Decks VAACT</span>
  </h1>
  <p class="psub">Recherche de decks Yu-Gi-Oh! + cartes officielles</p>
  <div class="orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
</div>

<div class="gwrap">
  <!-- CONTROLS -->
  <div class="deck-controls">
    <select id="saisonSelect">
      <option value="">📅 Saison</option>
    </select>
    <select id="duellisteSelect" disabled>
      <option value="">👤 Duelliste</option>
    </select>
  </div>
  <!-- SEARCH -->
  <div class="search-box">
    <input id="searchInput" placeholder="🔍 Rechercher un deck..." autocomplete="off">
    <div id="suggestions"></div>
  </div>
  <!-- DISPLAY -->
  <div id="deckDisplay" class="deck-display"></div>
</div>

</body>
</html>
