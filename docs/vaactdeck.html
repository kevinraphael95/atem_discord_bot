<!DOCTYPE html>
<html lang="fr" data-theme="shinigami">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Decks VAACT — Atem</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/decks.css">

<script src="js/decks.js" defer></script>

<style>
.content { max-width: 900px; margin: auto; }
</style>

</head>

<body>

<div class="phdr">
  <h1>Decks VAACT</h1>
  <p>Navigation des decks + recherche + cartes Yu-Gi-Oh</p>
</div>

<div class="content">

  <!-- 🔽 DROPDOWNS (gardés comme demandé) -->
  <div class="deck-controls">

    <select id="saisonSelect">
      <option value="">📅 Saison</option>
    </select>

    <select id="duellisteSelect" disabled>
      <option value="">👤 Duelliste</option>
    </select>

  </div>

  <!-- 🔍 SEARCH -->
  <div class="search-box">
    <input id="searchInput" placeholder="🔍 Rechercher un duelliste...">
    <div id="suggestions"></div>
  </div>

  <!-- ⭐ FAVORIS -->
  <button id="showFavs">⭐ Mes favoris</button>

  <!-- 🎴 DISPLAY -->
  <div id="deckDisplay" class="deck-display">
    <p class="placeholder">Sélectionne un deck ou fais une recherche.</p>
  </div>

</div>

</body>
</html>
