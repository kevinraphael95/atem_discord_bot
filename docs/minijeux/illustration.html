<!DOCTYPE html>
<html lang="fr" data-theme="shinigami">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devine l'Illustration — Atem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Serif+JP:wght@300;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<script src="../js/nav.js" defer></script>
<style>
/* ── ILLUSTRATION LAYOUT ───────────────────────────── */
.illu-wrap {
  position: relative; z-index: 1;
  max-width: 620px; margin: 0 auto;
  padding: 2rem 1.5rem 6rem;
  display: flex; flex-direction: column; align-items: center; gap: 1.3rem;
  opacity: 0; animation: rise .7s .4s forwards;
}

/* HUD */
.hud {
  display: flex; align-items: center; gap: 1.2rem;
  flex-wrap: wrap; justify-content: center;
}
.hud-stat {
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  font-family: 'Shippori Mincho', serif;
}
.hud-val  { font-size: 1.3rem; font-weight: 800; color: var(--gold-lt); line-height: 1; }
.hud-lbl  { font-size: .52rem; letter-spacing: .15em; color: var(--muted); text-transform: uppercase; }
.hud-div  { width: 1px; height: 28px; background: var(--border); }

/* Timer */
.timer-bar-wrap {
  width: 100%; height: 3px;
  background: var(--rim); overflow: hidden;
}
.timer-bar {
  height: 100%; background: var(--gold);
  transition: width .1s linear, background .3s;
  width: 100%;
}
.timer-bar.low { background: var(--ko-tx); }

/* Illustration */
.illu-frame {
  width: 100%; max-width: 360px;
  border: 1px solid var(--gold-line);
  background: var(--deep); overflow: hidden;
  position: relative;
}
.illu-frame img { width: 100%; display: block; }
.illu-placeholder {
  width: 100%; aspect-ratio: 4/3;
  display: flex; align-items: center; justify-content: center;
  font-size: 3rem; background: var(--deep);
}

/* Hint archétype */
.arch-hint {
  font-family: 'DM Sans', sans-serif; font-style: italic;
  font-size: .82rem; color: var(--muted); text-align: center;
}

/* Choix */
.choices {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: .7rem; width: 100%;
}
.choice-btn {
  padding: .8rem 1rem;
  font-family: 'Shippori Mincho', serif; font-size: .68rem;
  font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  background: var(--panel); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; transition: all .2s;
  text-align: center; line-height: 1.4;
}
.choice-btn:hover:not(:disabled) {
  background: var(--gold-pale); color: var(--gold-lt);
  border-color: var(--gold-line); transform: translateY(-2px);
}
.choice-btn:disabled { cursor: default; }
.choice-btn.correct {
  background: var(--ok-bg) !important; border-color: var(--ok-bd) !important;
  color: var(--ok-tx) !important;
}
.choice-btn.wrong {
  background: var(--ko-bg) !important; border-color: var(--ko-bd) !important;
  color: var(--ko-tx) !important; opacity: .6;
}

/* Résultat flash */
.illu-result {
  width: 100%; padding: .75rem 1.2rem; text-align: center;
  font-family: 'Shippori Mincho', serif; font-size: .75rem;
  font-weight: 700; letter-spacing: .07em;
  border: 1px solid; display: none; animation: flashIn .25s ease;
}
.illu-result.on      { display: block; }
.illu-result.correct { background: var(--ok-bg); border-color: var(--ok-bd); color: var(--ok-tx); }
.illu-result.wrong   { background: var(--ko-bg); border-color: var(--ko-bd); color: var(--ko-tx); }
.illu-result.timeout { background: var(--yw-bg); border-color: var(--yw-bd); color: var(--yw-tx); }
@keyframes flashIn { from{opacity:0;transform:translateY(-5px);} to{opacity:1;transform:translateY(0);} }

/* Loading */
.illu-load {
  font-family: 'Shippori Mincho', serif; font-size: .7rem;
  letter-spacing: .15em; color: var(--muted); text-transform: uppercase;
}

/* Boutons nav */
.illu-next-btn {
  background: var(--gold); color: var(--void); border: none;
  font-family: 'Shippori Mincho', serif; font-size: .65rem; font-weight: 700;
  letter-spacing: .15em; text-transform: uppercase;
  padding: .7rem 2rem; cursor: pointer; transition: all .2s;
}
.illu-next-btn:hover { background: var(--gold-lt); }

.illu-back {
  font-family: 'Shippori Mincho', serif; font-size: .65rem;
  letter-spacing: .15em; text-transform: uppercase;
  color: var(--muted); text-decoration: none;
  border: 1px solid var(--border); padding: .55rem 1.2rem;
  transition: all .2s;
}
.illu-back:hover { color: var(--gold-lt); border-color: var(--gold-line); }

@media (max-width: 500px) {
  .choices  { grid-template-columns: 1fr; }
  .illu-wrap { padding: 1.5rem .9rem 5rem; }
}
</style>
</head>
<body>

<div class="atmo"></div>
<div class="top-bar"></div>

<div class="phdr">
  <h1 class="pttl">
    <span class="t1">Devine l'Illustration</span>
  </h1>
  <p class="psub">Identifie la carte YGO d'après son illustration — 60 secondes.</p>
  <div class="orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
</div>

<div class="illu-wrap">

  <!-- HUD -->
  <div class="hud">
    <div class="hud-stat">
      <div class="hud-val" id="hGood">0</div>
      <div class="hud-lbl">✅ Bonnes</div>
    </div>
    <div class="hud-div"></div>
    <div class="hud-stat">
      <div class="hud-val" id="hBad">0</div>
      <div class="hud-lbl">❌ Ratées</div>
    </div>
    <div class="hud-div"></div>
    <div class="hud-stat">
      <div class="hud-val" id="hStreak">0</div>
      <div class="hud-lbl">🔥 Série</div>
    </div>
  </div>

  <!-- Loading -->
  <div class="illu-load" id="illu-load">Chargement…</div>

  <!-- Timer -->
  <div class="timer-bar-wrap" id="timer-wrap" style="display:none">
    <div class="timer-bar" id="timer-bar"></div>
  </div>

  <!-- Illustration -->
  <div class="illu-frame" id="illu-frame" style="display:none">
    <div class="illu-placeholder" id="illu-placeholder">🖼️</div>
    <img id="illu-img" style="display:none" alt="Illustration">
  </div>

  <!-- Hint -->
  <div class="arch-hint" id="arch-hint" style="display:none"></div>

  <!-- Choix -->
  <div class="choices" id="choices" style="display:none"></div>

  <!-- Résultat -->
  <div class="illu-result" id="illu-result"></div>

  <!-- Bouton suivant -->
  <button class="illu-next-btn" id="next-btn" style="display:none" onclick="nextRound()">
    Question suivante →
  </button>

  <a class="illu-back" href="../minijeux.html">← Retour aux mini-jeux</a>

</div>

<script>
let score = { good: 0, bad: 0, streak: 0 };
let timer = null;
let timeLeft = 60;
let answered = false;
let correctAnswer = '';

// Cache de cartes pour éviter de tout recharger à chaque round
let cardPool = [];

async function refillPool() {
  const offset = Math.floor(Math.random() * 9000);
  const res  = await fetch(
    `https://db.ygoprodeck.com/api/v7/cardinfo.php?num=100&offset=${offset}&language=fr`
  );
  const data = await res.json();
  cardPool = (data.data || []).filter(c => c.card_images?.[0]?.image_url_cropped);
}

function renderHUD() {
  document.getElementById('hGood').textContent   = score.good;
  document.getElementById('hBad').textContent    = score.bad;
  document.getElementById('hStreak').textContent = score.streak;
}

function updateTimerBar() {
  const bar = document.getElementById('timer-bar');
  bar.style.width   = (timeLeft / 60 * 100) + '%';
  bar.className     = 'timer-bar' + (timeLeft <= 10 ? ' low' : '');
}

function showResult(msg, type) {
  const el = document.getElementById('illu-result');
  el.className   = 'illu-result on ' + type;
  el.textContent = msg;
}

function revealAnswer(clickedBtn, container) {
  container.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === correctAnswer) b.classList.add('correct');
    else if (b === clickedBtn)           b.classList.add('wrong');
  });
}

function handleAnswer(btn, name, container) {
  if (answered) return;
  answered = true;
  clearInterval(timer);
  revealAnswer(btn, container);

  if (name === correctAnswer) {
    showResult('✅ Bonne réponse !', 'correct');
    score.good++; score.streak++;
  } else {
    showResult('❌ Raté ! C\'était : ' + correctAnswer, 'wrong');
    score.bad++; score.streak = 0;
  }
  renderHUD();
  document.getElementById('next-btn').style.display = 'block';
}

async function nextRound() {
  clearInterval(timer);
  answered = false;

  const load    = document.getElementById('illu-load');
  const frame   = document.getElementById('illu-frame');
  const choices = document.getElementById('choices');
  const result  = document.getElementById('illu-result');
  const nextBtn = document.getElementById('next-btn');
  const hint    = document.getElementById('arch-hint');
  const wrap    = document.getElementById('timer-wrap');

  load.textContent    = 'Chargement…';
  load.style.display  = 'block';
  frame.style.display   = 'none';
  choices.style.display = 'none';
  result.className      = 'illu-result';
  nextBtn.style.display = 'none';
  hint.style.display    = 'none';
  wrap.style.display    = 'none';

  // Reset image
  const img  = document.getElementById('illu-img');
  const ph   = document.getElementById('illu-placeholder');
  img.style.display = 'none';
  img.src = '';
  ph.style.display  = 'flex';

  try {
    if (cardPool.length < 10) await refillPool();

    // Pioche la carte cible
    const idx      = Math.floor(Math.random() * cardPool.length);
    const trueCard = cardPool.splice(idx, 1)[0];
    correctAnswer  = trueCard.name;

    // 3 mauvaises réponses du même type si possible
    const sameType = cardPool.filter(c => c.type === trueCard.type);
    const pool     = sameType.length >= 3 ? sameType : cardPool;
    const wrongs   = pool
      .filter(c => c.name !== trueCard.name)
      .sort(() => Math.random() - 0.5)
      .slice(0, 3);

    const allChoices = [trueCard, ...wrongs].sort(() => Math.random() - 0.5);

    // Image
    const imgUrl = trueCard.card_images[0].image_url_cropped;
    img.onload  = () => { img.style.display = 'block'; ph.style.display = 'none'; };
    img.onerror = () => { img.style.display = 'none';  ph.style.display = 'flex'; };
    img.src = imgUrl;

    // Hint
    const arch = trueCard.archetype;
    hint.textContent  = '🔹 Type : ' + trueCard.type + (arch ? ' · Archétype : ' + arch : '');
    hint.style.display = 'block';

    // Choix
    choices.innerHTML = '';
    allChoices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c.name;
      btn.onclick = () => handleAnswer(btn, c.name, choices);
      choices.appendChild(btn);
    });

    load.style.display    = 'none';
    frame.style.display   = 'block';
    choices.style.display = 'grid';
    wrap.style.display    = 'block';

    // Timer
    timeLeft = 60;
    updateTimerBar();
    timer = setInterval(() => {
      timeLeft--;
      updateTimerBar();
      if (timeLeft <= 0) {
        clearInterval(timer);
        if (!answered) {
          answered = true;
          revealAnswer(null, choices);
          showResult('⏰ Temps écoulé ! C\'était : ' + correctAnswer, 'timeout');
          score.bad++; score.streak = 0;
          renderHUD();
          nextBtn.style.display = 'block';
        }
      }
    }, 1000);

  } catch(e) {
    load.textContent = '❌ Erreur de chargement. Réessaie.';
    document.getElementById('next-btn').style.display = 'block';
  }
}

nextRound();
</script>
</body>
</html>
