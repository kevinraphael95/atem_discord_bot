<!DOCTYPE html>
<html lang="fr" data-theme="shinigami">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staple ou Pas — Atem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Serif+JP:wght@300;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<script src="../js/nav.js" defer></script>
<style>
/* ── STAPLE LAYOUT ─────────────────────────────────── */
.sp-wrap {
  position: relative; z-index: 1;
  max-width: 700px; margin: 0 auto;
  padding: 2rem 1.5rem 6rem;
  display: flex; flex-direction: column; align-items: center; gap: 1.3rem;
  opacity: 0; animation: rise .7s .4s forwards;
}

/* HUD */
.hud {
  display: flex; align-items: center; gap: 1.2rem;
  flex-wrap: wrap; justify-content: center;
}
.hud-stat {
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  font-family: 'Shippori Mincho', serif;
}
.hud-val  { font-size: 1.3rem; font-weight: 800; color: var(--gold-lt); line-height: 1; }
.hud-lbl  { font-size: .52rem; letter-spacing: .15em; color: var(--muted); text-transform: uppercase; }
.hud-div  { width: 1px; height: 28px; background: var(--border); }

/* Card box */
.card-box {
  width: 100%; background: var(--panel);
  border: 1px solid var(--border);
  padding: 1.4rem; display: flex; gap: 1.2rem;
  align-items: flex-start; min-height: 170px;
  transition: border-color .3s, background .3s;
  position: relative; overflow: hidden;
}
.card-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: transparent; transition: background .3s;
}
.card-box.correct { border-color: var(--ok-bd); background: var(--ok-bg); }
.card-box.correct::before { background: var(--ok-bd); }
.card-box.wrong   { border-color: var(--ko-bd); background: var(--ko-bg); }
.card-box.wrong::before   { background: var(--ko-bd); }

.card-thumb-wrap {
  width: 80px; min-width: 80px; height: 116px;
  border: 1px solid var(--gold-line); background: var(--deep);
  position: relative; overflow: hidden; flex-shrink: 0;
}
.card-thumb { width: 100%; height: 100%; object-fit: cover; display: none; }
.card-spinner {
  position: absolute; inset: 0; display: flex;
  align-items: center; justify-content: center;
  font-size: 1.6rem; color: var(--dim);
}

.card-info { flex: 1; display: flex; flex-direction: column; gap: .5rem; }
.card-name {
  font-family: 'Shippori Mincho', serif; font-size: .95rem; font-weight: 700;
  color: var(--gold-lt); letter-spacing: .05em; line-height: 1.3;
}
.card-type {
  font-family: 'DM Sans', sans-serif; font-size: .72rem;
  font-style: italic; color: var(--muted);
}
.card-desc {
  font-family: 'DM Sans', sans-serif; font-size: .8rem;
  color: var(--text); line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 5;
  -webkit-box-orient: vertical; overflow: hidden;
}

/* Guess buttons */
.guess-btns { display: flex; gap: .8rem; width: 100%; }
.guess-btn {
  flex: 1; padding: .9rem 1rem;
  font-family: 'Shippori Mincho', serif; font-size: .68rem;
  font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
  border: 1px solid; cursor: pointer; transition: all .22s;
  background: transparent;
}
.guess-btn.staple {
  color: var(--ok-tx); border-color: var(--ok-bd);
}
.guess-btn.staple:hover:not(:disabled) {
  background: var(--ok-bg); box-shadow: 0 0 16px rgba(21,128,61,.2); transform: translateY(-2px);
}
.guess-btn.not-staple {
  color: var(--ko-tx); border-color: var(--ko-bd);
}
.guess-btn.not-staple:hover:not(:disabled) {
  background: var(--ko-bg); box-shadow: 0 0 16px rgba(153,27,27,.2); transform: translateY(-2px);
}
.guess-btn:disabled { cursor: default; opacity: .35; transform: none; box-shadow: none; }
.guess-btn.revealed-correct { background: var(--ok-bg) !important; border-color: var(--ok-bd) !important; color: var(--ok-tx) !important; }
.guess-btn.revealed-wrong   { background: var(--ko-bg) !important; border-color: var(--ko-bd) !important; color: var(--ko-tx) !important; opacity: .4; }

/* Flash */
.sp-flash {
  width: 100%; padding: .75rem 1.2rem; text-align: center;
  font-family: 'Shippori Mincho', serif; font-size: .75rem;
  font-weight: 700; letter-spacing: .07em;
  border: 1px solid; display: none; animation: flashIn .25s ease;
}
.sp-flash.on { display: block; }
.sp-flash.ok { background: var(--ok-bg); border-color: var(--ok-bd); color: var(--ok-tx); }
.sp-flash.ko { background: var(--ko-bg); border-color: var(--ko-bd); color: var(--ko-tx); }
@keyframes flashIn { from{opacity:0;transform:translateY(-5px);} to{opacity:1;transform:translateY(0);} }

/* Loading */
.sp-load {
  font-family: 'Shippori Mincho', serif; font-size: .7rem;
  letter-spacing: .15em; color: var(--muted); text-transform: uppercase;
}

/* Next / Back */
.sp-next-area { display: none; }
.sp-next-btn {
  background: var(--gold); color: var(--void); border: none;
  font-family: 'Shippori Mincho', serif; font-size: .65rem; font-weight: 700;
  letter-spacing: .15em; text-transform: uppercase;
  padding: .7rem 2rem; cursor: pointer; transition: all .2s;
}
.sp-next-btn:hover { background: var(--gold-lt); }

.sp-back {
  font-family: 'Shippori Mincho', serif; font-size: .65rem;
  letter-spacing: .15em; text-transform: uppercase;
  color: var(--muted); text-decoration: none;
  border: 1px solid var(--border); padding: .55rem 1.2rem;
  transition: all .2s;
}
.sp-back:hover { color: var(--gold-lt); border-color: var(--gold-line); }

/* Staple badge */
.staple-badge {
  display: none; font-family: 'Shippori Mincho', serif;
  font-size: .55rem; font-weight: 700; letter-spacing: .14em;
  text-transform: uppercase; padding: .25rem .7rem;
  border: 1px solid; margin-bottom: .2rem; align-self: flex-start;
}
.staple-badge.show { display: inline-block; }
.staple-badge.yes { border-color: var(--ok-bd); color: var(--ok-tx); background: var(--ok-bg); }
.staple-badge.no  { border-color: var(--ko-bd); color: var(--ko-tx); background: var(--ko-bg); }

@media (max-width: 540px) {
  .card-box   { flex-direction: column; }
  .guess-btns { flex-direction: column; }
  .sp-wrap    { padding: 1.5rem .9rem 5rem; }
}
</style>
</head>
<body>

<div class="atmo"></div>
<div class="top-bar"></div>

<div class="phdr">
  <h1 class="pttl">
    <span class="t1">Staple ou Pas ?</span>
  </h1>
  <p class="psub">Une carte s'affiche — tu décides si c'est une staple TCG ou non.</p>
  <div class="orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
</div>

<div class="sp-wrap">

  <!-- HUD -->
  <div class="hud">
    <div class="hud-stat">
      <div class="hud-val" id="hGood">0</div>
      <div class="hud-lbl">✅ Bonnes</div>
    </div>
    <div class="hud-div"></div>
    <div class="hud-stat">
      <div class="hud-val" id="hBad">0</div>
      <div class="hud-lbl">❌ Ratées</div>
    </div>
    <div class="hud-div"></div>
    <div class="hud-stat">
      <div class="hud-val" id="hStreak">0</div>
      <div class="hud-lbl">🔥 Série</div>
    </div>
  </div>

  <!-- Loading -->
  <div class="sp-load" id="sp-load">Tirage d'une carte…</div>

  <!-- Card -->
  <div class="card-box" id="card-box" style="display:none">
    <div class="card-thumb-wrap">
      <img id="card-thumb" class="card-thumb" alt="">
      <div class="card-spinner" id="card-spinner">🃏</div>
    </div>
    <div class="card-info">
      <div class="staple-badge" id="staple-badge"></div>
      <p class="card-name" id="card-name"></p>
      <p class="card-type" id="card-type"></p>
      <p class="card-desc" id="card-desc"></p>
    </div>
  </div>

  <!-- Flash -->
  <div class="sp-flash" id="sp-flash"></div>

  <!-- Buttons -->
  <div class="guess-btns" id="guess-btns" style="display:none">
    <button class="guess-btn staple"     id="btn-staple" onclick="guess(true)">💎 Staple</button>
    <button class="guess-btn not-staple" id="btn-not"    onclick="guess(false)">🪨 Pas Staple</button>
  </div>



  <a class="sp-back" href="../minijeux.html">← Retour aux mini-jeux</a>

</div>


<script>
// ── STATE ───────────────────────────────────────────
let good = 0, bad = 0, streak = 0;
let isStaple = false;

// ── POOLS (cache) ────────────────────────────────────
let staplePool   = [];   // chargé une seule fois
let randomPool   = [];   // buffer roulant de cartes random
let nextCardData = null; // prefetch de la prochaine carte

const RANDOM_BUFFER = 5; // nombre de cartes random à pré-charger
const TOTAL_RANDOM  = 10000; // offset max pour l'API

// ── API HELPERS ──────────────────────────────────────
async function fetchWithTimeout(url, ms = 8000) {
  const ctrl = new AbortController();
  const id   = setTimeout(() => ctrl.abort(), ms);
  try {
    const res = await fetch(url, { signal: ctrl.signal });
    clearTimeout(id);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  } catch (e) {
    clearTimeout(id);
    throw e;
  }
}

async function loadStaplePool() {
  if (staplePool.length) return;
  const data = await fetchWithTimeout(
    'https://db.ygoprodeck.com/api/v7/cardinfo.php?staple=yes'
  );
  staplePool = data.data || [];
}

async function fillRandomBuffer() {
  while (randomPool.length < RANDOM_BUFFER) {
    const offset = Math.floor(Math.random() * TOTAL_RANDOM);
    try {
      const data = await fetchWithTimeout(
        `https://db.ygoprodeck.com/api/v7/cardinfo.php?num=3&offset=${offset}`
      );
      const cards = (data.data || []).filter(c => c.card_images?.length);
      randomPool.push(...cards);
    } catch { /* on retry silencieusement */ }
  }
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// ── PREFETCH ─────────────────────────────────────────
async function prefetchNext() {
  const willBeStaple = Math.random() < 0.5;
  if (willBeStaple) {
    await loadStaplePool();
    nextCardData = { card: pickRandom(staplePool), staple: true };
  } else {
    await fillRandomBuffer();
    nextCardData = { card: randomPool.shift(), staple: false };
    fillRandomBuffer(); // re-remplit en arrière-plan
  }
}

// ── UI HELPERS ───────────────────────────────────────
function renderHUD() {
  document.getElementById('hGood').textContent   = good;
  document.getElementById('hBad').textContent    = bad;
  document.getElementById('hStreak').textContent = streak;
}

function showFlash(type, msg) {
  const f = document.getElementById('sp-flash');
  f.className = 'sp-flash on ' + type;
  f.textContent = msg;
}

function resetUI() {
  const load  = document.getElementById('sp-load');
  const box   = document.getElementById('card-box');
  const btns  = document.getElementById('guess-btns');
  const flash = document.getElementById('sp-flash');
  const badge = document.getElementById('staple-badge');
  const img   = document.getElementById('card-thumb');
  const spin  = document.getElementById('card-spinner');

  load.style.display  = 'block';
  load.textContent    = 'Tirage d\'une carte…';
  box.style.display   = 'none';
  btns.style.display  = 'none';
  flash.classList.remove('on');
  badge.className     = 'staple-badge';
  img.style.display   = 'none';
  img.src             = '';
  spin.style.display  = 'flex';
  spin.textContent    = '🃏';
  box.className       = 'card-box';

  document.getElementById('btn-staple').disabled  = false;
  document.getElementById('btn-not').disabled     = false;
  document.getElementById('btn-staple').className = 'guess-btn staple';
  document.getElementById('btn-not').className    = 'guess-btn not-staple';
}

function displayCard(card) {
  document.getElementById('card-name').textContent = card.name || '???';
  document.getElementById('card-type').textContent = card.type || '';
  document.getElementById('card-desc').textContent = card.desc || '—';

  const imgUrl =
    card.card_images?.[0]?.image_url_cropped ||
    card.card_images?.[0]?.image_url_small   ||
    card.card_images?.[0]?.image_url;

  if (imgUrl) {
    const img  = document.getElementById('card-thumb');
    const spin = document.getElementById('card-spinner');
    img.onload  = () => { img.style.display = 'block'; spin.style.display = 'none'; };
    img.onerror = () => { spin.textContent = '🃏'; };
    img.src = imgUrl;
  }

  const load = document.getElementById('sp-load');
  load.style.display = 'none';
  document.getElementById('card-box').style.display  = 'flex';
  document.getElementById('guess-btns').style.display = 'flex';
}

// ── MAIN FLOW ─────────────────────────────────────────
async function nextCard() {
  resetUI();

  try {
    // Si prefetch prêt → instantané, sinon on charge
    if (!nextCardData) await prefetchNext();
    const { card, staple } = nextCardData;
    nextCardData = null;
    isStaple = staple;

    displayCard(card);

    // Prefetch de la suivante en arrière-plan
    prefetchNext().catch(() => {});

  } catch (e) {
    const load = document.getElementById('sp-load');
    load.textContent = '❌ Erreur de chargement. Clique pour réessayer.';
    load.style.cursor = 'pointer';
    load.onclick = () => { load.onclick = null; load.style.cursor = ''; nextCard(); };
  }
}

function guess(guessStaple) {
  document.getElementById('btn-staple').disabled = true;
  document.getElementById('btn-not').disabled    = true;

  const correct = guessStaple === isStaple;
  const box   = document.getElementById('card-box');
  const badge = document.getElementById('staple-badge');
  const btnS  = document.getElementById('btn-staple');
  const btnN  = document.getElementById('btn-not');

  badge.textContent = isStaple ? '💎 Staple confirmée' : '🪨 Pas une staple';
  badge.className   = 'staple-badge show ' + (isStaple ? 'yes' : 'no');

  if (correct) {
    good++; streak++;
    box.className = 'card-box correct';
    btnS.className = guessStaple ? 'guess-btn revealed-correct' : 'guess-btn revealed-wrong';
    btnN.className = guessStaple ? 'guess-btn revealed-wrong'   : 'guess-btn revealed-correct';
    const s = streak >= 3 ? ` · 🔥 ×${streak}` : '';
    showFlash('ok', '✅ Bonne réponse !' + (isStaple ? ' C\'est bien une staple.' : ' Pas une staple en effet.') + s);
  } else {
    bad++; streak = 0;
    box.className = 'card-box wrong';
    btnS.className = guessStaple ? 'guess-btn revealed-wrong'   : 'guess-btn revealed-correct';
    btnN.className = guessStaple ? 'guess-btn revealed-correct' : 'guess-btn revealed-wrong';
    showFlash('ko', '❌ Raté ! ' + (isStaple ? 'C\'était une staple !' : 'Ce n\'est pas une staple.'));
  }

  renderHUD();
  setTimeout(nextCard, 1200);
}

// ── INIT ──────────────────────────────────────────────
// Précharge le pool staple + prefetch la première carte en parallèle
loadStaplePool().catch(() => {});
fillRandomBuffer().catch(() => {});
nextCard();
</script>
</body>
</html>
