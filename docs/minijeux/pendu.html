<!DOCTYPE html>
<html lang="fr" data-theme="shinigami">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendu YGO — Atem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Serif+JP:wght@300;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<script src="../js/nav.js" defer></script>
<style>
/* ── PENDU LAYOUT ──────────────────────────────────── */
.pendu-wrap {
  position: relative; z-index: 1;
  max-width: 700px; margin: 0 auto;
  padding: 2rem 1.5rem 6rem;
  display: flex; flex-direction: column; align-items: center; gap: 1.3rem;
  opacity: 0; animation: rise .7s .4s forwards;
}

/* ASCII pendu */
.pendu-ascii {
  font-family: 'Courier New', monospace; font-size: .88rem;
  color: var(--muted); background: var(--panel);
  border: 1px solid var(--border);
  padding: 1.3rem 2rem; white-space: pre; line-height: 1.4;
  min-width: 220px; text-align: left; transition: color .3s, border-color .3s;
}
.pendu-ascii.danger { color: var(--ko-tx); border-color: var(--ko-bd); }

/* Erreurs */
.erreurs-bar {
  display: flex; gap: 5px; align-items: center;
  font-family: 'Shippori Mincho', serif;
  font-size: .6rem; letter-spacing: .15em; color: var(--muted); text-transform: uppercase;
}
.erreur-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--rim); border: 1px solid var(--border); transition: all .3s;
}
.erreur-dot.active { background: var(--ko-tx); border-color: var(--ko-bd); box-shadow: 0 0 5px rgba(153,27,27,.3); }

/* Mot */
.word-display {
  display: flex; flex-wrap: wrap; justify-content: center;
  gap: .35rem; min-height: 3.2rem;
}
.letter-box {
  font-family: 'Shippori Mincho', serif; font-size: 1.4rem; font-weight: 800;
  width: 2rem; height: 2.6rem;
  display: flex; align-items: center; justify-content: center;
  border-bottom: 2px solid var(--gold-line); color: var(--gold-lt);
  transition: all .2s;
}
.letter-box.separator { border-bottom: none; color: var(--muted); }
.letter-box.revealed  { animation: pop .2s ease; }
@keyframes pop { 0%{transform:scale(1.3);} 100%{transform:scale(1);} }

/* Indice */
.indice-box {
  font-family: 'DM Sans', sans-serif; font-style: italic; font-size: .85rem;
  color: var(--muted); background: var(--rei-pale);
  border: 1px solid rgba(30,127,232,.18);
  padding: .55rem 1.2rem; text-align: center;
}

/* Lettres tentées */
.lettres-tentees {
  font-family: 'DM Sans', sans-serif; font-size: .75rem;
  color: var(--dim); letter-spacing: .08em; text-align: center; min-height: 1.4rem;
}

/* Clavier */
.keyboard { display: flex; flex-direction: column; gap: .35rem; align-items: center; width: 100%; }
.keyboard-row { display: flex; gap: .35rem; justify-content: center; }
.key {
  font-family: 'Shippori Mincho', serif; font-size: .7rem; font-weight: 700;
  width: 2.4rem; height: 2.4rem;
  background: var(--panel); border: 1px solid var(--border); color: var(--muted);
  cursor: pointer; transition: all .18s;
  display: flex; align-items: center; justify-content: center;
}
.key:hover:not(:disabled) { background: var(--gold-pale); color: var(--gold-lt); border-color: var(--gold-line); }
.key:disabled { cursor: default; }
.key.correct  { background: var(--ok-bg); color: var(--ok-tx); border-color: var(--ok-bd); }
.key.wrong    { background: var(--ko-bg); color: var(--ko-tx); border-color: var(--ko-bd); opacity: .5; }

/* Flash résultat */
.pendu-result {
  width: 100%; padding: 1rem 1.5rem; text-align: center;
  font-family: 'Shippori Mincho', serif; font-size: .9rem;
  font-weight: 700; letter-spacing: .08em;
  border: 1px solid; display: none; animation: flashIn .35s ease;
}
.pendu-result.on  { display: block; }
.pendu-result.win { background: var(--ok-bg); border-color: var(--ok-bd); color: var(--ok-tx); }
.pendu-result.lose{ background: var(--ko-bg); border-color: var(--ko-bd); color: var(--ko-tx); }
@keyframes flashIn { from{opacity:0;transform:translateY(-6px);} to{opacity:1;transform:translateY(0);} }

/* Loading */
.pendu-load {
  font-family: 'Shippori Mincho', serif; font-size: .7rem;
  letter-spacing: .15em; color: var(--muted); text-transform: uppercase;
}

/* Buttons */
.pendu-btns {
  display: none; gap: .8rem; flex-wrap: wrap; justify-content: center;
}
.pendu-btn {
  background: var(--gold); color: var(--void); border: none;
  font-family: 'Shippori Mincho', serif; font-size: .65rem; font-weight: 700;
  letter-spacing: .15em; text-transform: uppercase;
  padding: .7rem 2rem; cursor: pointer; transition: all .2s;
}
.pendu-btn:hover { background: var(--gold-lt); }
.pendu-back {
  font-family: 'Shippori Mincho', serif; font-size: .65rem;
  letter-spacing: .15em; text-transform: uppercase;
  color: var(--muted); text-decoration: none;
  border: 1px solid var(--border); padding: .55rem 1.2rem;
  transition: all .2s;
}
.pendu-back:hover { color: var(--gold-lt); border-color: var(--gold-line); }

@media (max-width: 500px) {
  .key { width: 2rem; height: 2rem; font-size: .6rem; }
  .pendu-wrap { padding: 1.5rem .9rem 5rem; }
  .letter-box { font-size: 1.1rem; width: 1.7rem; }
}
</style>
</head>
<body>

<div class="atmo"></div>
<div class="top-bar"></div>

<div class="phdr">
  <h1 class="pttl">
    <span class="t1">Le Pendu</span>
  </h1>
  <p class="psub">Devinez le nom de la carte lettre par lettre avant d'être pendu.</p>
  <div class="orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
</div>

<div class="pendu-wrap">

  <div class="pendu-load" id="pendu-load">Chargement d'une carte…</div>

  <pre id="pendu-ascii" class="pendu-ascii" style="display:none"></pre>

  <div class="erreurs-bar" id="erreurs-bar" style="display:none">
    <span style="margin-right:.4rem">Erreurs</span>
    <div class="erreur-dot" id="d0"></div><div class="erreur-dot" id="d1"></div>
    <div class="erreur-dot" id="d2"></div><div class="erreur-dot" id="d3"></div>
    <div class="erreur-dot" id="d4"></div><div class="erreur-dot" id="d5"></div>
    <div class="erreur-dot" id="d6"></div>
  </div>

  <div class="word-display"    id="word-display"    style="display:none"></div>
  <div class="indice-box"      id="indice"          style="display:none"></div>
  <div class="lettres-tentees" id="lettres-tentees" style="display:none"></div>
  <div class="keyboard"        id="keyboard"        style="display:none"></div>

  <div class="pendu-result" id="pendu-result"></div>

  <div class="pendu-btns" id="pendu-btns">
    <button class="pendu-btn" onclick="newGame()">🔁 Nouvelle partie</button>
    <a class="pendu-back" href="../minijeux.html">← Retour</a>
  </div>

</div>

<footer>
  <p class="foot-copy">© kevinraphael95 · CC BY-NC-SA 4.0</p>
</footer>

<script>
const PENDU_STAGES = [
  `     \n     \n     \n     \n     \n=========`,
  `     +---+\n     |   |\n         |\n         |\n         |\n     =========`,
  `     +---+\n     |   |\n     O   |\n         |\n         |\n     =========`,
  `     +---+\n     |   |\n     O   |\n     |   |\n         |\n     =========`,
  `     +---+\n     |   |\n     O   |\n    /|   |\n         |\n     =========`,
  `     +---+\n     |   |\n     O   |\n    /|\\  |\n         |\n     =========`,
  `     +---+\n     |   |\n     O   |\n    /|\\  |\n    /    |\n     =========`,
  `     +---+\n     |   |\n     O   |\n    /|\\  |\n    / \\  |\n     =========`,
];

const ROWS = [
  ['A','Z','E','R','T','Y','U','I','O','P'],
  ['Q','S','D','F','G','H','J','K','L','M'],
  ['W','X','C','V','B','N']
];

function normalize(str) {
  return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
}

let CARD_POOL = [], poolIndex = 0;

async function refillPool() {
  const offset = Math.floor(Math.random() * 9800);
  const url = `https://db.ygoprodeck.com/api/v7/cardinfo.php?format=tcg&num=50&offset=${offset}&sort=name`;
  const res  = await fetch(url);
  const data = await res.json();
  const cards = (data.data || []).filter(c => c.name && normalize(c.name).replace(/[^a-z]/g,'').length >= 4);
  if (!cards.length) throw new Error('Pool vide');
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  CARD_POOL = cards; poolIndex = 0;
}

async function pickCard() {
  if (poolIndex >= CARD_POOL.length) await refillPool();
  return CARD_POOL[poolIndex++];
}

let state = {};

function hide(...ids) { ids.forEach(id => document.getElementById(id).style.display = 'none'); }
function show(id, disp='block') { document.getElementById(id).style.display = disp; }

async function newGame() {
  hide('pendu-ascii','word-display','indice','lettres-tentees','keyboard','erreurs-bar');
  document.getElementById('pendu-result').classList.remove('on');
  document.getElementById('pendu-btns').style.display = 'none';
  document.getElementById('pendu-load').textContent = 'Chargement d\'une carte…';
  show('pendu-load');

  try {
    const card   = await pickCard();
    const nom    = card.name.trim();
    const nomNorm= normalize(nom);
    const type   = card.type || 'Inconnu';
    const attr   = card.attribute || null;
    const arch   = card.archetype || null;
    let indice   = type;
    if (attr) indice += ' · ' + attr;
    if (arch) indice += ' · ' + arch;

    state = { nom, nomNorm, indice, trouve: new Set(), rate: new Set(), fini: false, maxErreurs: 7 };

    hide('pendu-load');
    renderAll();
  } catch(e) {
    document.getElementById('pendu-load').textContent = '❌ Impossible de charger une carte. Réessaie.';
    document.getElementById('pendu-btns').style.display = 'flex';
  }
}

function renderAll() {
  // ASCII
  const ascii = document.getElementById('pendu-ascii');
  ascii.textContent = PENDU_STAGES[Math.min(state.rate.size, 7)];
  ascii.className = 'pendu-ascii' + (state.rate.size >= 5 ? ' danger' : '');
  show('pendu-ascii');

  // Dots
  show('erreurs-bar', 'flex');
  for (let i = 0; i < 7; i++) {
    document.getElementById('d'+i).className = 'erreur-dot' + (i < state.rate.size ? ' active' : '');
  }

  // Mot
  const wd = document.getElementById('word-display');
  show('word-display', 'flex');
  wd.innerHTML = '';
  for (const c of state.nom) {
    const box = document.createElement('div');
    if ([' ', '-', "'"].includes(c)) {
      box.className = 'letter-box separator';
      box.textContent = c === ' ' ? '\u00A0' : c;
    } else {
      const cn = normalize(c);
      const found = state.trouve.has(cn);
      box.className = 'letter-box' + (found ? ' revealed' : '');
      box.textContent = found ? c.toUpperCase() : '';
    }
    wd.appendChild(box);
  }

  // Indice
  document.getElementById('indice').textContent = '📋 ' + state.indice;
  show('indice');

  // Lettres tentées
  const tried = [...state.trouve, ...state.rate].sort();
  const lt = document.getElementById('lettres-tentees');
  lt.textContent = tried.length ? 'Tentées : ' + tried.join(', ').toUpperCase() : '';
  show('lettres-tentees');

  buildKeyboard();

  // Résultat
  const banner = document.getElementById('pendu-result');
  if (state.fini) {
    banner.className = 'pendu-result on ' + (state.win ? 'win' : 'lose');
    banner.textContent = state.win
      ? '🎉 Bravo ! C\'était bien : ' + state.nom
      : '💀 Perdu ! La réponse était : ' + state.nom;
    // Révèle tout le mot
    wd.innerHTML = '';
    for (const c of state.nom) {
      const box = document.createElement('div');
      box.className = 'letter-box' + ([' ','-',"'"].includes(c) ? ' separator' : '');
      box.textContent = c.toUpperCase();
      wd.appendChild(box);
    }
    disableKeyboard();
    document.getElementById('pendu-btns').style.display = 'flex';
  } else {
    banner.classList.remove('on');
    document.getElementById('pendu-btns').style.display = 'flex';
  }
}

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  show('keyboard', 'flex');
  kb.innerHTML = '';
  for (const row of ROWS) {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'keyboard-row';
    for (const letter of row) {
      const key = document.createElement('button');
      key.className = 'key';
      key.textContent = letter;
      key.id = 'key-' + letter;
      const ln = normalize(letter);
      if (state.trouve.has(ln))      { key.classList.add('correct'); key.disabled = true; }
      else if (state.rate.has(ln))   { key.classList.add('wrong');   key.disabled = true; }
      else key.onclick = () => handleLetter(letter);
      rowDiv.appendChild(key);
    }
    kb.appendChild(rowDiv);
  }
}

function disableKeyboard() {
  document.querySelectorAll('.key').forEach(k => { k.disabled = true; k.onclick = null; });
}

function handleLetter(letter) {
  if (state.fini) return;
  const ln = normalize(letter);
  if (state.trouve.has(ln) || state.rate.has(ln)) return;
  const inWord = [...state.nomNorm].some(c => normalize(c) === ln);
  if (inWord) state.trouve.add(ln);
  else        state.rate.add(ln);
  const alphaChars = [...state.nomNorm].filter(c => c.match(/[a-z]/));
  const allFound   = alphaChars.every(c => state.trouve.has(c));
  if (allFound)                        { state.fini = true; state.win = true; }
  else if (state.rate.size >= state.maxErreurs) { state.fini = true; state.win = false; }
  renderAll();
}

document.addEventListener('keydown', e => {
  if (state.fini || !state.nom) return;
  const l = e.key.toUpperCase();
  if (l.length === 1 && l.match(/[A-Z]/)) handleLetter(l);
});

newGame();
</script>
</body>
</html>
