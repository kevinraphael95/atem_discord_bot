<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendu YGO — Atem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #06050a; --ink: #131119;
    --gold: #d4a843; --gold-light: #f0c860;
    --silver: #8a8fa8; --white: #f0ecf5;
    --mystic: #7a3a8a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--white); font-family: 'Crimson Pro', serif; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(122,58,138,0.15) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  nav { position: fixed; top: 0; width: 100%; z-index: 100; padding: 1.2rem 3rem; display: flex; align-items: center; justify-content: space-between; background: linear-gradient(to bottom, rgba(6,5,10,0.97) 0%, transparent 100%); border-bottom: 1px solid rgba(212,168,67,0.1); backdrop-filter: blur(4px); }
  .nav-logo { font-family: 'Cinzel', serif; font-weight: 900; font-size: 1.1rem; color: var(--gold); text-decoration: none; letter-spacing: 0.2em; }
  .nav-back { font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--silver); text-decoration: none; letter-spacing: 0.2em; text-transform: uppercase; transition: color 0.3s; }
  .nav-back:hover { color: var(--gold); }
  main { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; padding: 8rem 2rem 5rem; display: flex; flex-direction: column; align-items: center; gap: 2rem; }
  .game-title { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.4em; color: var(--gold); text-transform: uppercase; text-align: center; }

  .pendu-ascii { font-family: 'Courier New', monospace; font-size: 0.9rem; color: var(--silver); background: var(--ink); border: 1px solid rgba(212,168,67,0.12); padding: 1.5rem 2rem; white-space: pre; line-height: 1.4; min-width: 220px; text-align: left; transition: color 0.3s; }
  .pendu-ascii.danger { color: #c44020; }

  .word-display { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem; min-height: 3rem; }
  .letter-box { font-family: 'Cinzel', serif; font-size: 1.4rem; font-weight: 700; width: 2rem; height: 2.5rem; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid rgba(212,168,67,0.4); color: var(--gold-light); transition: all 0.2s; }
  .letter-box.separator { border-bottom: none; color: var(--silver); }
  @keyframes pop { 0% { transform: scale(1.3); } 100% { transform: scale(1); } }

  .indice-box { font-style: italic; font-size: 0.95rem; color: var(--silver); background: rgba(122,58,138,0.1); border: 1px solid rgba(122,58,138,0.2); padding: 0.6rem 1.2rem; text-align: center; }

  .erreurs-bar { display: flex; gap: 0.5rem; align-items: center; font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.2em; color: var(--silver); }
  .erreur-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(196,64,32,0.25); border: 1px solid rgba(196,64,32,0.4); transition: background 0.3s; }
  .erreur-dot.active { background: #c44020; border-color: #c44020; }

  .lettres-tentees { font-size: 0.85rem; color: rgba(138,143,168,0.6); letter-spacing: 0.1em; text-align: center; min-height: 1.5rem; }

  .keyboard { display: flex; flex-direction: column; gap: 0.4rem; align-items: center; width: 100%; }
  .keyboard-row { display: flex; gap: 0.4rem; justify-content: center; }
  .key { font-family: 'Cinzel', serif; font-size: 0.75rem; font-weight: 700; width: 2.4rem; height: 2.4rem; background: var(--ink); border: 1px solid rgba(212,168,67,0.15); color: var(--silver); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
  .key:hover:not(:disabled) { background: rgba(212,168,67,0.1); color: var(--gold); border-color: rgba(212,168,67,0.4); }
  .key:disabled { cursor: default; opacity: 0.3; }
  .key.correct { background: rgba(58,138,74,0.2); color: #6fc87d; border-color: rgba(58,138,74,0.4); }
  .key.wrong { background: rgba(138,58,58,0.15); color: rgba(196,64,32,0.6); border-color: rgba(138,58,58,0.3); }

  .btn { font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase; padding: 0.9rem 2.2rem; border: 1px solid; cursor: pointer; transition: all 0.3s; background: var(--gold); color: var(--black); border-color: var(--gold); }
  .btn:hover { background: var(--gold-light); box-shadow: 0 0 30px rgba(212,168,67,0.35); transform: translateY(-2px); }
  .btn-ghost { background: transparent; color: var(--silver); border-color: rgba(138,143,168,0.3); }
  .btn-ghost:hover { color: var(--white); border-color: var(--white); }

  .result-banner { font-family: 'Cinzel', serif; font-size: 1.2rem; letter-spacing: 0.1em; padding: 1rem 2rem; border: 1px solid; text-align: center; width: 100%; animation: fadeUp 0.4s forwards; }
  .result-banner.win { background: rgba(58,138,74,0.1); border-color: rgba(58,138,74,0.4); color: #6fc87d; }
  .result-banner.lose { background: rgba(138,58,58,0.1); border-color: rgba(138,58,58,0.4); color: #c44020; }

  .loading { font-style: italic; color: var(--silver); letter-spacing: 0.15em; font-size: 0.9rem; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 500px) {
    nav { padding: 1rem 1.5rem; }
    main { padding: 6rem 1rem 3rem; }
    .key { width: 2rem; height: 2rem; font-size: 0.65rem; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="../index.html">𓂀 ATEM</a>
  <a class="nav-back" href="../minijeux.html">← Mini-jeux</a>
</nav>

<main>
  <p class="game-title">🕹️ Le Pendu — Yu-Gi-Oh!</p>

  <div id="loading" class="loading">Chargement d'une carte…</div>

  <pre id="pendu-ascii" class="pendu-ascii" style="display:none"></pre>

  <div class="erreurs-bar" id="erreurs-bar" style="display:none">
    <span style="margin-right:0.5rem">Erreurs :</span>
    <div class="erreur-dot" id="d0"></div><div class="erreur-dot" id="d1"></div>
    <div class="erreur-dot" id="d2"></div><div class="erreur-dot" id="d3"></div>
    <div class="erreur-dot" id="d4"></div><div class="erreur-dot" id="d5"></div>
    <div class="erreur-dot" id="d6"></div>
  </div>

  <div id="word-display" class="word-display" style="display:none"></div>
  <div id="indice" class="indice-box" style="display:none"></div>
  <div id="lettres-tentees" class="lettres-tentees" style="display:none"></div>
  <div id="keyboard" class="keyboard" style="display:none"></div>
  <div id="result-banner" style="display:none"></div>

  <div id="btn-area" style="display:none; gap:1rem; flex-wrap:wrap; justify-content:center;">
    <button class="btn" onclick="newGame()">Nouvelle partie</button>
    <a class="btn btn-ghost" href="../minijeux.html">← Retour</a>
  </div>
</main>

<script>
const PENDU_STAGES = [
  `     \n     \n     \n     \n     \n=========`,
  `     +---+\n     |   |\n         |\n         |\n         |\n     =========`,
  `     +---+\n     |   |\n     O   |\n         |\n         |\n     =========`,
  `     +---+\n     |   |\n     O   |\n     |   |\n         |\n     =========`,
  `     +---+\n     |   |\n     O   |\n    /|   |\n         |\n     =========`,
  `     +---+\n     |   |\n     O   |\n    /|\\  |\n         |\n     =========`,
  `     +---+\n     |   |\n     O   |\n    /|\\  |\n    /    |\n     =========`,
  `     +---+\n     |   |\n     O   |\n    /|\\  |\n    / \\  |\n     =========`,
];

const ROWS = [
  ['A','Z','E','R','T','Y','U','I','O','P'],
  ['Q','S','D','F','G','H','J','K','L','M'],
  ['W','X','C','V','B','N']
];

function normalize(str) {
  return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
}

// Pool local de cartes pour éviter de refetch à chaque partie
let CARD_POOL = [];
let poolIndex = 0;

async function refillPool() {
  // Offset aléatoire dans les ~10000 cartes TCG
  const offset = Math.floor(Math.random() * 9800);
  const url = `https://db.ygoprodeck.com/api/v7/cardinfo.php?format=tcg&num=50&offset=${offset}&sort=name`;
  const res = await fetch(url);
  const data = await res.json();
  const cards = (data.data || []).filter(c => c.name && normalize(c.name).replace(/[^a-z]/g, '').length >= 4);
  if (cards.length === 0) throw new Error('Pool vide');
  // Mélange
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  CARD_POOL = cards;
  poolIndex = 0;
}

async function pickCard() {
  if (poolIndex >= CARD_POOL.length) await refillPool();
  return CARD_POOL[poolIndex++];
}

let state = {};

async function newGame() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('loading').textContent = 'Chargement d\'une carte…';
  document.getElementById('pendu-ascii').style.display = 'none';
  document.getElementById('word-display').style.display = 'none';
  document.getElementById('indice').style.display = 'none';
  document.getElementById('lettres-tentees').style.display = 'none';
  document.getElementById('keyboard').style.display = 'none';
  document.getElementById('result-banner').style.display = 'none';
  document.getElementById('erreurs-bar').style.display = 'none';
  document.getElementById('btn-area').style.display = 'none';

  try {
    const card = await pickCard();

    const nom = card.name.trim();
    const nomNorm = normalize(nom);
    const type = card.type || 'Inconnu';
    const attr = card.attribute || null;
    const arch = card.archetype || null;
    let indice = type;
    if (attr) indice += ' / ' + attr;
    if (arch) indice += ' / ' + arch;

    state = { nom, nomNorm, indice, trouve: new Set(), rate: new Set(), fini: false, maxErreurs: 7 };

    document.getElementById('loading').style.display = 'none';
    renderAll();
  } catch(e) {
    document.getElementById('loading').textContent = '❌ Impossible de charger une carte. Réessaie.';
    document.getElementById('btn-area').style.display = 'flex';
  }
}

function renderAll() {
  const ascii = document.getElementById('pendu-ascii');
  ascii.textContent = PENDU_STAGES[Math.min(state.rate.size, 7)];
  ascii.className = 'pendu-ascii' + (state.rate.size >= 5 ? ' danger' : '');
  ascii.style.display = 'block';

  const bar = document.getElementById('erreurs-bar');
  bar.style.display = 'flex';
  for (let i = 0; i < 7; i++) {
    document.getElementById('d'+i).className = 'erreur-dot' + (i < state.rate.size ? ' active' : '');
  }

  const wd = document.getElementById('word-display');
  wd.style.display = 'flex';
  wd.innerHTML = '';
  for (const c of state.nom) {
    const box = document.createElement('div');
    if ([' ', '-', "'"].includes(c)) {
      box.className = 'letter-box separator';
      box.textContent = c === ' ' ? '\u00A0' : c;
    } else {
      const cn = normalize(c);
      box.className = 'letter-box';
      box.textContent = state.trouve.has(cn) ? c.toUpperCase() : '';
    }
    wd.appendChild(box);
  }

  const ind = document.getElementById('indice');
  ind.textContent = '📋 ' + state.indice;
  ind.style.display = 'block';

  const lt = document.getElementById('lettres-tentees');
  const tried = [...state.trouve, ...state.rate].sort();
  lt.textContent = tried.length ? 'Tentées : ' + tried.join(', ').toUpperCase() : '';
  lt.style.display = 'block';

  buildKeyboard();

  const banner = document.getElementById('result-banner');
  banner.style.display = 'none';

  if (state.fini) {
    banner.style.display = 'block';
    document.getElementById('btn-area').style.display = 'flex';
    if (state.win) {
      banner.className = 'result-banner win';
      banner.textContent = '🎉 Bravo ! C\'était bien : ' + state.nom;
    } else {
      banner.className = 'result-banner lose';
      banner.textContent = '💀 Perdu ! La réponse était : ' + state.nom;
    }
    wd.innerHTML = '';
    for (const c of state.nom) {
      const box = document.createElement('div');
      box.className = 'letter-box' + ([' ', '-', "'"].includes(c) ? ' separator' : '');
      box.textContent = c.toUpperCase();
      wd.appendChild(box);
    }
    disableKeyboard();
  } else {
    document.getElementById('btn-area').style.display = 'flex';
  }
}

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.style.display = 'flex';
  kb.innerHTML = '';
  for (const row of ROWS) {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'keyboard-row';
    for (const letter of row) {
      const key = document.createElement('button');
      key.className = 'key';
      key.textContent = letter;
      key.id = 'key-' + letter;
      const ln = normalize(letter);
      if (state.trouve.has(ln)) { key.classList.add('correct'); key.disabled = true; }
      else if (state.rate.has(ln)) { key.classList.add('wrong'); key.disabled = true; }
      else key.onclick = () => handleLetter(letter);
      rowDiv.appendChild(key);
    }
    kb.appendChild(rowDiv);
  }
}

function disableKeyboard() {
  document.querySelectorAll('.key').forEach(k => { k.disabled = true; k.onclick = null; });
}

function handleLetter(letter) {
  if (state.fini) return;
  const ln = normalize(letter);
  if (state.trouve.has(ln) || state.rate.has(ln)) return;

  const inWord = [...state.nomNorm].some(c => normalize(c) === ln);
  if (inWord) state.trouve.add(ln);
  else state.rate.add(ln);

  const alphaChars = [...state.nomNorm].filter(c => c.match(/[a-z]/));
  const allFound = alphaChars.every(c => state.trouve.has(c));
  if (allFound) { state.fini = true; state.win = true; }
  else if (state.rate.size >= state.maxErreurs) { state.fini = true; state.win = false; }

  renderAll();
}

document.addEventListener('keydown', (e) => {
  if (state.fini || !state.nom) return;
  const l = e.key.toUpperCase();
  if (l.length === 1 && l.match(/[A-Z]/)) handleLetter(l);
});

newGame();
</script>
</body>
</html>
