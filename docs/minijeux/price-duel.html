<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YGO Price Duel — Atem</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --black:#06050a;
  --ink:#131119;
  --gold:#d4a843;
  --gold-light:#f0c860;
  --silver:#8a8fa8;
  --good:#06d6a0;
  --bad:#ef233c;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--black);
  color:#fff;
  font-family:'Nunito',sans-serif;
}

/* ───── NAV (comme tes autres jeux) ───── */
nav{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:100;
  padding:1rem 1.5rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(6,5,10,0.95);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(212,168,67,0.15);
}

.nav-logo{
  font-family:'Cinzel';
  font-weight:900;
  color:var(--gold);
  text-decoration:none;
  letter-spacing:0.2em;
}

.nav-back{
  font-family:'Cinzel';
  font-size:0.7rem;
  color:var(--silver);
  text-decoration:none;
}

/* ───── MAIN ───── */
main{
  padding:6rem 1rem 3rem;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1rem;
}

/* HUD */
.hud{
  display:flex;
  gap:1.5rem;
  font-family:'Cinzel';
  font-size:0.75rem;
  color:var(--silver);
}
.hud span{
  color:var(--gold);
  font-weight:900;
}

/* GAME */
.game{
  width:100%;
  max-width:520px;
  display:flex;
  flex-direction:column;
  gap:1rem;
}

/* CARDS GRID (PC + mobile propre) */
.cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0.8rem;
}

.card{
  background:var(--ink);
  border:1px solid rgba(212,168,67,0.15);
  border-radius:14px;
  padding:0.8rem;
  text-align:center;
  transition:0.2s;
}

/* image CARRÉE clean */
.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:0.5rem;
  background:#0f0f18;
}

.name{
  font-size:0.8rem;
  font-weight:700;
  color:#fff;
  margin-bottom:0.2rem;
}

.price{
  font-size:1.4rem;
  font-weight:900;
  color:var(--gold-light);
}

/* BUTTONS */
.buttons{
  display:flex;
  gap:0.7rem;
}

button{
  flex:1;
  padding:0.9rem;
  border:none;
  border-radius:10px;
  font-family:'Cinzel';
  font-weight:900;
  letter-spacing:0.1em;
  cursor:pointer;
  font-size:0.75rem;
  transition:0.15s;
}

.higher{background:#c93046;color:#fff;}
.lower{background:#3a47d4;color:#fff;}

button:active{transform:scale(0.97);}

/* RESULT */
.result{
  text-align:center;
  font-family:'Cinzel';
  font-size:0.95rem;
  padding:0.6rem;
  border-radius:10px;
  min-height:1.2rem;
}

.win{color:var(--good);}
.lose{color:var(--bad);}

/* NEXT (auto + bouton fallback) */
.next{
  background:var(--gold);
  color:#111;
  padding:0.9rem;
  border-radius:10px;
  font-weight:900;
  border:none;
  cursor:pointer;
  display:none;
}

/* MOBILE */
@media (max-width:500px){
  .cards{grid-template-columns:1fr;}
  .price{font-size:1.2rem;}
  button{font-size:0.7rem;}
}
</style>
</head>

<body>

<nav>
  <a class="nav-logo" href="../index.html">𓂀 ATEM</a>
  <a class="nav-back" href="../minijeux.html">← Mini-jeux</a>
</nav>

<main>

<div class="hud">
  <div>Score <span id="score">0</span></div>
  <div>🔥 <span id="streak">0</span></div>
</div>

<div class="game">

  <div class="cards">

    <div class="card">
      <img id="imgA">
      <div class="name" id="nameA"></div>
      <div class="price" id="priceA"></div>
    </div>

    <div class="card">
      <img id="imgB">
      <div class="name" id="nameB"></div>
      <div class="price" id="priceB">?</div>
    </div>

  </div>

  <div class="buttons">
    <button class="higher" onclick="guess('higher')">PLUS CHER</button>
    <button class="lower" onclick="guess('lower')">MOINS CHER</button>
  </div>

  <div id="result" class="result"></div>

  <button id="nextBtn" class="next" onclick="next()">CARTE SUIVANTE →</button>

</div>

</main>

<script>
let cards=[],a,b;
let score=0,streak=0;
let locked=false;

/* LOAD */
async function load(){
  const r=await fetch("https://db.ygoprodeck.com/api/v7/cardinfo.php?format=tcg");
  const d=await r.json();

  cards=d.data
    .filter(c=>c.card_images?.[0])
    .map(c=>({
      name:c.name,
      price:parseFloat(c.card_prices?.[0]?.cardmarket_price||0),
      img:c.card_images[0].image_url_cropped
    }))
    .filter(c=>c.price>0.1);

  next();
}

/* NEXT ROUND */
function next(){
  locked=false;
  document.getElementById("result").textContent="";
  document.getElementById("nextBtn").style.display="none";

  a=cards[Math.random()*cards.length|0];
  b=cards[Math.random()*cards.length|0];

  document.getElementById("imgA").src=a.img;
  document.getElementById("imgB").src=b.img;

  document.getElementById("nameA").textContent=a.name;
  document.getElementById("nameB").textContent=b.name;

  document.getElementById("priceA").textContent="€"+a.price.toFixed(2);
  document.getElementById("priceB").textContent="?";
}

/* GUESS */
function guess(choice){
  if(locked) return;
  locked=true;

  let correct = b.price > a.price ? "higher" : "lower";
  let ok = choice === correct;

  document.getElementById("priceB").textContent="€"+b.price.toFixed(2);

  const res=document.getElementById("result");

  if(ok){
    score++; streak++;
    res.textContent="✅ correct";
    res.className="result win";
  }else{
    streak=0;
    res.textContent="❌ wrong";
    res.className="result lose";
  }

  document.getElementById("score").textContent=score;
  document.getElementById("streak").textContent=streak;

  // AUTO NEXT comme tes autres jeux
  setTimeout(next, 1400);
}

load();
</script>

</body>
</html>
