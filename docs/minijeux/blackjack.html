<!DOCTYPE html>
<html lang="fr" data-theme="shinigami">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackjack YGO — Atem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Serif+JP:wght@300;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<script src="../js/nav.js" defer></script>
<style>
/* ── BLACKJACK LAYOUT ──────────────────────────────── */
.bj-wrap {
  position: relative; z-index: 1;
  max-width: 700px; margin: 0 auto;
  padding: 2rem 1.5rem 6rem;
  display: flex; flex-direction: column; align-items: center; gap: 1.3rem;
  opacity: 0; animation: rise .7s .4s forwards;
}

/* Score HUD */
.hud {
  display: flex; align-items: center; gap: 1.2rem;
  flex-wrap: wrap; justify-content: center;
}
.hud-stat {
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  font-family: 'Shippori Mincho', serif;
}
.hud-val  { font-size: 1.3rem; font-weight: 800; color: var(--gold-lt); line-height: 1; }
.hud-lbl  { font-size: .52rem; letter-spacing: .15em; color: var(--muted); text-transform: uppercase; }
.hud-div  { width: 1px; height: 28px; background: var(--border); }

/* Main de jeu */
.hand-section {
  width: 100%; background: var(--panel);
  border: 1px solid var(--border);
  padding: 1.4rem;
}
.hand-label {
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'Shippori Mincho', serif; font-size: .6rem;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 1rem;
}
.hand-total {
  font-family: 'Shippori Mincho', serif; font-size: 1.1rem;
  font-weight: 800; color: var(--gold-lt); letter-spacing: .1em;
}
.hand-total.bust      { color: var(--ko-tx); }
.hand-total.blackjack { color: var(--ok-tx); }

.cards-list { display: flex; flex-wrap: wrap; gap: .7rem; }

.card-chip {
  background: var(--gold-pale); border: 1px solid var(--gold-line);
  padding: .4rem .9rem;
  font-family: 'DM Sans', sans-serif; font-size: .82rem; color: var(--text);
  display: flex; align-items: center; gap: .5rem;
  animation: fadeUp .2s forwards;
}
.card-chip .level-badge {
  font-family: 'Shippori Mincho', serif; font-size: .7rem;
  color: var(--gold-lt); background: var(--gold-pale);
  padding: .1rem .4rem; border: 1px solid var(--gold-line);
}
.card-chip.hidden {
  background: var(--rei-pale); border-color: rgba(124,68,204,.22);
  color: var(--muted); font-style: italic;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }

/* Boutons action */
.action-btns { display: flex; gap: .8rem; width: 100%; }
.action-btn {
  flex: 1; padding: .9rem 1rem;
  font-family: 'Shippori Mincho', serif; font-size: .68rem;
  font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
  border: 1px solid; cursor: pointer; transition: all .22s;
  background: transparent;
}
.action-btn.hit   { color: var(--ok-tx); border-color: var(--ok-bd); }
.action-btn.hit:hover:not(:disabled)   { background: var(--ok-bg); transform: translateY(-2px); box-shadow: 0 0 16px rgba(21,128,61,.2); }
.action-btn.stand { color: var(--ko-tx); border-color: var(--ko-bd); }
.action-btn.stand:hover:not(:disabled) { background: var(--ko-bg); transform: translateY(-2px); }
.action-btn:disabled { opacity: .3; cursor: default; transform: none; box-shadow: none; }

/* Résultat */
.bj-result {
  width: 100%; padding: 1rem 1.5rem; text-align: center;
  font-family: 'Shippori Mincho', serif; font-size: .9rem;
  font-weight: 700; letter-spacing: .08em;
  border: 1px solid; display: none; animation: flashIn .35s ease;
}
.bj-result.on   { display: block; }
.bj-result.win  { background: var(--ok-bg); border-color: var(--ok-bd); color: var(--ok-tx); }
.bj-result.lose { background: var(--ko-bg); border-color: var(--ko-bd); color: var(--ko-tx); }
.bj-result.draw { background: var(--yw-bg); border-color: var(--yw-bd); color: var(--yw-tx); }
@keyframes flashIn { from{opacity:0;transform:translateY(-6px);} to{opacity:1;transform:translateY(0);} }

/* Loading */
.bj-load {
  font-family: 'Shippori Mincho', serif; font-size: .7rem;
  letter-spacing: .15em; color: var(--muted); text-transform: uppercase;
}

/* Sous-titre */
.bj-sub {
  font-family: 'DM Sans', sans-serif; font-style: italic;
  font-size: .82rem; color: var(--muted); text-align: center;
}

/* Boutons nav */
.bj-btns {
  display: none; gap: .8rem; flex-wrap: wrap; justify-content: center;
}
.bj-btn {
  background: var(--gold); color: var(--void); border: none;
  font-family: 'Shippori Mincho', serif; font-size: .65rem; font-weight: 700;
  letter-spacing: .15em; text-transform: uppercase;
  padding: .7rem 2rem; cursor: pointer; transition: all .2s;
}
.bj-btn:hover { background: var(--gold-lt); }
.bj-back {
  font-family: 'Shippori Mincho', serif; font-size: .65rem;
  letter-spacing: .15em; text-transform: uppercase;
  color: var(--muted); text-decoration: none;
  border: 1px solid var(--border); padding: .55rem 1.2rem;
  transition: all .2s;
}
.bj-back:hover { color: var(--gold-lt); border-color: var(--gold-line); }

@media (max-width: 500px) {
  .bj-wrap { padding: 1.5rem .9rem 5rem; }
  .action-btns { flex-direction: column; }
}
</style>
</head>
<body>

<div class="atmo"></div>
<div class="top-bar"></div>

<div class="phdr">
  <h1 class="pttl">
    <span class="t1">Blackjack YGO</span>
  </h1>
  <p class="psub">Valeur = niveau du monstre · Dépasse 21 → Bust</p>
  <div class="orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
</div>

<div class="bj-wrap">

  <!-- HUD -->
  <div class="hud">
    <div class="hud-stat">
      <div class="hud-val" id="hWins">0</div>
      <div class="hud-lbl">🏆 Victoires</div>
    </div>
    <div class="hud-div"></div>
    <div class="hud-stat">
      <div class="hud-val" id="hLosses">0</div>
      <div class="hud-lbl">💀 Défaites</div>
    </div>
  </div>

  <!-- Loading -->
  <div class="bj-load" id="bj-load">Chargement des cartes…</div>

  <!-- Mains -->
  <div id="dealer-section" class="hand-section" style="display:none">
    <div class="hand-label">
      <span>Dealer</span>
      <span class="hand-total" id="dealer-total">?</span>
    </div>
    <div class="cards-list" id="dealer-cards"></div>
  </div>

  <div id="player-section" class="hand-section" style="display:none">
    <div class="hand-label">
      <span>Toi</span>
      <span class="hand-total" id="player-total">0</span>
    </div>
    <div class="cards-list" id="player-cards"></div>
  </div>

  <!-- Boutons action -->
  <div class="action-btns" id="action-btns" style="display:none">
    <button class="action-btn hit"   id="btn-hit"   onclick="hit()">🃏 Tirer</button>
    <button class="action-btn stand" id="btn-stand" onclick="stand()">✋ Rester</button>
  </div>

  <!-- Résultat -->
  <div class="bj-result" id="bj-result"></div>

  <!-- Boutons nav -->
  <div class="bj-btns" id="bj-btns">
    <button class="bj-btn" onclick="startGame()">🔁 Nouvelle partie</button>
    <a class="bj-back" href="../minijeux.html">← Retour</a>
  </div>

  <!-- Retour permanent -->
  <a class="bj-back" id="bj-back-static" href="../minijeux.html">← Retour aux mini-jeux</a>

</div>

<script>
let deck = [];
let playerCards = [], dealerCards = [];
let gameOver = false;
let score = { wins: 0, losses: 0 };

async function fetchDeck() {
  const offset = Math.floor(Math.random() * 9000);
  const url = `https://db.ygoprodeck.com/api/v7/cardinfo.php?format=tcg&num=80&offset=${offset}&language=fr`;
  const res  = await fetch(url);
  const data = await res.json();
  const monsters = (data.data || []).filter(c => c.type?.includes('Monster') && c.level >= 1);
  for (let i = monsters.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [monsters[i], monsters[j]] = [monsters[j], monsters[i]];
  }
  return monsters.slice(0, 52);
}

function cardVal(card) { return card.level || 1; }
function totalOf(cards) { return cards.reduce((s, c) => s + cardVal(c), 0); }

function renderCard(card, hidden = false) {
  const div = document.createElement('div');
  if (hidden) {
    div.className = 'card-chip hidden';
    div.textContent = '🂠 Carte cachée';
  } else {
    div.className = 'card-chip';
    div.innerHTML = `${card.name} <span class="level-badge">Niv.${card.level}</span>`;
  }
  return div;
}

function updateDisplay(showDealer = false) {
  // Joueur
  const pc = document.getElementById('player-cards');
  pc.innerHTML = '';
  playerCards.forEach(c => pc.appendChild(renderCard(c)));
  const pt = totalOf(playerCards);
  const ptEl = document.getElementById('player-total');
  ptEl.textContent = pt;
  ptEl.className = 'hand-total' + (pt > 21 ? ' bust' : pt === 21 ? ' blackjack' : '');

  // Dealer
  const dc = document.getElementById('dealer-cards');
  dc.innerHTML = '';
  if (showDealer) {
    dealerCards.forEach(c => dc.appendChild(renderCard(c)));
    const dt = totalOf(dealerCards);
    const dtEl = document.getElementById('dealer-total');
    dtEl.textContent = dt;
    dtEl.className = 'hand-total' + (dt > 21 ? ' bust' : dt === 21 ? ' blackjack' : '');
  } else {
    dc.appendChild(renderCard(dealerCards[0]));
    dc.appendChild(renderCard(null, true));
    document.getElementById('dealer-total').textContent = '?';
  }
}

function endGame(msg, type) {
  gameOver = true;
  document.getElementById('btn-hit').disabled   = true;
  document.getElementById('btn-stand').disabled = true;

  const result = document.getElementById('bj-result');
  result.className   = 'bj-result on ' + type;
  result.textContent = msg;

  document.getElementById('bj-btns').style.display = 'flex';
  document.getElementById('bj-back-static').style.display = 'none';

  if (type === 'win')  score.wins++;
  else if (type === 'lose') score.losses++;
  document.getElementById('hWins').textContent   = score.wins;
  document.getElementById('hLosses').textContent = score.losses;

  updateDisplay(true);
}

function hit() {
  if (gameOver || !deck.length) return;
  playerCards.push(deck.pop());
  updateDisplay();
  if (totalOf(playerCards) > 21) endGame('💀 Bust ! Tu as dépassé 21.', 'lose');
}

function stand() {
  if (gameOver) return;
  while (totalOf(dealerCards) < 17 && deck.length) dealerCards.push(deck.pop());
  const pt = totalOf(playerCards);
  const dt = totalOf(dealerCards);
  if      (dt > 21 || pt > dt) endGame('🏆 Tu gagnes !', 'win');
  else if (pt < dt)            endGame('😢 Le dealer gagne…', 'lose');
  else                         endGame('⚖️ Égalité !', 'draw');
}

async function startGame() {
  const load = document.getElementById('bj-load');
  load.textContent    = 'Chargement des cartes…';
  load.style.display  = 'block';

  document.getElementById('dealer-section').style.display = 'none';
  document.getElementById('player-section').style.display = 'none';
  document.getElementById('action-btns').style.display    = 'none';
  document.getElementById('bj-result').className          = 'bj-result';
  document.getElementById('bj-btns').style.display        = 'none';
  document.getElementById('bj-back-static').style.display = 'block';
  gameOver = false;

  try {
    if (deck.length < 10) deck = await fetchDeck();

    playerCards = [deck.pop(), deck.pop()];
    dealerCards = [deck.pop()];

    load.style.display = 'none';
    document.getElementById('dealer-section').style.display = 'block';
    document.getElementById('player-section').style.display = 'block';
    document.getElementById('action-btns').style.display    = 'flex';
    document.getElementById('btn-hit').disabled   = false;
    document.getElementById('btn-stand').disabled = false;

    updateDisplay(false);

    if (totalOf(playerCards) === 21) endGame('🎰 Blackjack ! Victoire instantanée !', 'win');

  } catch(e) {
    load.textContent = '❌ Erreur de chargement. Réessaie.';
    document.getElementById('bj-btns').style.display = 'flex';
  }
}

startGame();
</script>
</body>
</html>
