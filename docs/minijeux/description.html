<!DOCTYPE html>
<html lang="fr" data-theme="shinigami">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Description YGO — Atem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Serif+JP:wght@300;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<script src="../js/nav.js" defer></script>
<style>
/* ── DESCRIPTION LAYOUT ────────────────────────────── */
.desc-wrap {
  position: relative; z-index: 1;
  max-width: 700px; margin: 0 auto;
  padding: 2rem 1.5rem 6rem;
  display: flex; flex-direction: column; align-items: center; gap: 1.3rem;
  opacity: 0; animation: rise .7s .4s forwards;
}

/* HUD */
.hud { display: flex; align-items: center; gap: 1.2rem; flex-wrap: wrap; justify-content: center; }
.hud-stat { display: flex; flex-direction: column; align-items: center; gap: 1px; font-family: 'Shippori Mincho', serif; }
.hud-val  { font-size: 1.3rem; font-weight: 800; color: var(--gold-lt); line-height: 1; }
.hud-lbl  { font-size: .52rem; letter-spacing: .15em; color: var(--muted); text-transform: uppercase; }
.hud-div  { width: 1px; height: 28px; background: var(--border); }

/* Timer */
.timer-wrap { width: 100%; height: 3px; background: var(--rim); display: none; }
.timer-bar  { height: 100%; background: var(--gold); transition: width .1s linear; width: 100%; }
.timer-bar.low { background: var(--ko-tx); }

/* Description card */
.desc-card {
  width: 100%; background: var(--panel);
  border: 1px solid var(--border);
  padding: 1.4rem; display: none;
  flex-direction: column; gap: .9rem;
}
.desc-meta { display: flex; gap: .6rem; flex-wrap: wrap; }
.meta-tag {
  font-family: 'Shippori Mincho', serif; font-size: .55rem;
  font-weight: 700; letter-spacing: .18em; text-transform: uppercase;
  padding: .22rem .65rem; border: 1px solid var(--gold-line); color: var(--gold);
  background: var(--gold-pale);
}
.desc-text {
  font-family: 'DM Sans', sans-serif; font-size: .9rem; line-height: 1.75;
  color: var(--text); font-style: italic;
  border-left: 2px solid var(--gold-line); padding-left: 1rem;
}
.desc-stats {
  display: flex; gap: 1.2rem; flex-wrap: wrap;
  font-family: 'Shippori Mincho', serif; font-size: .72rem;
  font-weight: 700; color: var(--muted); letter-spacing: .06em;
}
.desc-stats span { color: var(--gold-lt); }

/* Choices */
.choices { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; width: 100%; display: none; }
.choice-btn {
  padding: .8rem 1rem;
  font-family: 'Shippori Mincho', serif; font-size: .68rem;
  font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  background: var(--panel); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; transition: all .2s;
  text-align: center; line-height: 1.4;
}
.choice-btn:hover:not(:disabled) { background: var(--gold-pale); color: var(--gold-lt); border-color: var(--gold-line); }
.choice-btn:disabled { cursor: default; }
.choice-btn.correct { background: var(--ok-bg); border-color: var(--ok-bd); color: var(--ok-tx); }
.choice-btn.wrong   { background: var(--ko-bg); border-color: var(--ko-bd); color: var(--ko-tx); }

/* Flash */
.desc-flash {
  width: 100%; padding: .75rem 1.2rem; text-align: center;
  font-family: 'Shippori Mincho', serif; font-size: .78rem;
  font-weight: 700; letter-spacing: .07em;
  border: 1px solid; display: none; animation: flashIn .25s ease;
}
.desc-flash.on      { display: block; }
.desc-flash.correct { background: var(--ok-bg); border-color: var(--ok-bd); color: var(--ok-tx); }
.desc-flash.wrong   { background: var(--ko-bg); border-color: var(--ko-bd); color: var(--ko-tx); }
.desc-flash.timeout { background: var(--yw-bg); border-color: var(--yw-bd); color: var(--yw-tx); }
@keyframes flashIn { from{opacity:0;transform:translateY(-5px);} to{opacity:1;transform:translateY(0);} }

/* Loading */
.desc-load {
  font-family: 'Shippori Mincho', serif; font-size: .7rem;
  letter-spacing: .15em; color: var(--muted); text-transform: uppercase;
}

/* Buttons */
.desc-next-area { display: none; }
.desc-next-btn {
  background: var(--gold); color: var(--void); border: none;
  font-family: 'Shippori Mincho', serif; font-size: .65rem; font-weight: 700;
  letter-spacing: .15em; text-transform: uppercase;
  padding: .7rem 2rem; cursor: pointer; transition: all .2s;
}
.desc-next-btn:hover { background: var(--gold-lt); }
.desc-back {
  font-family: 'Shippori Mincho', serif; font-size: .65rem;
  letter-spacing: .15em; text-transform: uppercase;
  color: var(--muted); text-decoration: none;
  border: 1px solid var(--border); padding: .55rem 1.2rem; transition: all .2s;
}
.desc-back:hover { color: var(--gold-lt); border-color: var(--gold-line); }

@media (max-width: 500px) {
  .choices   { grid-template-columns: 1fr; }
  .desc-wrap { padding: 1.5rem .9rem 5rem; }
}
</style>
</head>
<body>

<div class="atmo"></div>
<div class="top-bar"></div>

<div class="phdr">
  <h1 class="pttl">
    <span class="t1">Devine la Description</span>
    <span class="t2">Lis et identifie</span>
  </h1>
  <p class="psub">Une description de carte s'affiche — retrouvez son nom parmi 4 propositions.</p>
  <div class="orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
</div>

<div class="desc-wrap">

  <div class="hud">
    <div class="hud-stat">
      <div class="hud-val" id="hGood">0</div>
      <div class="hud-lbl">✅ Bonnes</div>
    </div>
    <div class="hud-div"></div>
    <div class="hud-stat">
      <div class="hud-val" id="hBad">0</div>
      <div class="hud-lbl">❌ Ratées</div>
    </div>
    <div class="hud-div"></div>
    <div class="hud-stat">
      <div class="hud-val" id="hStreak">0</div>
      <div class="hud-lbl">🔥 Série</div>
    </div>
  </div>

  <div class="timer-wrap" id="timer-wrap">
    <div class="timer-bar" id="timer-bar"></div>
  </div>

  <div class="desc-load" id="desc-load">Chargement…</div>

  <div class="desc-card" id="desc-card">
    <div class="desc-meta">
      <span class="meta-tag" id="meta-type"></span>
      <span class="meta-tag" id="meta-arch" style="display:none"></span>
    </div>
    <p class="desc-text" id="desc-text"></p>
    <div class="desc-stats" id="desc-stats"></div>
  </div>

  <div class="choices" id="choices"></div>

  <div class="desc-flash" id="desc-flash"></div>

  <div class="desc-next-area" id="next-area">
    <button class="desc-next-btn" onclick="nextRound()">Question suivante →</button>
  </div>

  <a class="desc-back" href="../minijeux.html">← Retour aux mini-jeux</a>

</div>

<footer>
  <p class="foot-copy">© kevinraphael95 · CC BY-NC-SA 4.0</p>
</footer>

<script>
let good = 0, bad = 0, streak = 0;
let timer = null, timeLeft = 60, answered = false, correctAnswer = '';

function renderHUD() {
  document.getElementById('hGood').textContent   = good;
  document.getElementById('hBad').textContent    = bad;
  document.getElementById('hStreak').textContent = streak;
}

function show(id, disp='block') { document.getElementById(id).style.display = disp; }
function hide(...ids) { ids.forEach(id => document.getElementById(id).style.display = 'none'); }

function showFlash(type, msg) {
  const f = document.getElementById('desc-flash');
  f.className = 'desc-flash on ' + type; f.textContent = msg;
}

function updateTimerBar() {
  const bar = document.getElementById('timer-bar');
  bar.style.width = (timeLeft / 60 * 100) + '%';
  bar.className = 'timer-bar' + (timeLeft <= 10 ? ' low' : '');
}

function normalize(str) {
  return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
}

function censorName(desc, name) {
  const re = new RegExp(name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
  return desc.replace(re, '[cette carte]');
}

function getTypeGroup(type) {
  const t = (type || '').toLowerCase();
  if (t.includes('monster') || t.includes('monstre')) return 'monstre';
  if (t.includes('spell')   || t.includes('magie'))   return 'magie';
  if (t.includes('trap')    || t.includes('piège'))    return 'piège';
  return 'autre';
}

async function nextRound() {
  clearInterval(timer); answered = false;
  hide('desc-card', 'desc-flash');
  document.getElementById('choices').style.display = 'none';
  document.getElementById('next-area').style.display = 'none';
  document.getElementById('timer-wrap').style.display = 'none';
  document.getElementById('desc-load').textContent = 'Chargement…';
  show('desc-load');

  try {
    const offset = Math.floor(Math.random() * 9500);
    const res  = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?format=tcg&num=80&offset=${offset}`);
    const data = await res.json();
    const all  = data.data || [];

    const valid = all.filter(c => c.desc && c.name.length > 3);
    if (valid.length < 4) throw new Error('Pas assez de cartes valides');

    const trueCard   = valid[Math.floor(Math.random() * valid.length)];
    correctAnswer    = trueCard.name;
    const desc       = censorName(trueCard.desc, trueCard.name);
    const typeGroup  = getTypeGroup(trueCard.type);

    const sameGroup = all.filter(c => c.name !== trueCard.name && getTypeGroup(c.type) === typeGroup);
    const pool      = (sameGroup.length >= 3 ? sameGroup : all.filter(c => c.name !== trueCard.name))
                        .sort(() => Math.random() - .5);
    const choices   = [trueCard, ...pool.slice(0, 3)].sort(() => Math.random() - .5);

    // Fill card
    document.getElementById('meta-type').textContent = trueCard.type || 'Type inconnu';
    const archEl = document.getElementById('meta-arch');
    if (trueCard.archetype) { archEl.textContent = trueCard.archetype; archEl.style.display = 'inline-block'; }
    else                    { archEl.style.display = 'none'; }

    document.getElementById('desc-text').textContent = desc.length > 600 ? desc.slice(0, 600) + '…' : desc;

    const statsEl = document.getElementById('desc-stats');
    statsEl.innerHTML = '';
    if (typeGroup === 'monstre') {
      if (trueCard.atk !== undefined) statsEl.innerHTML += `<span>⚔️ ATK ${trueCard.atk ?? '?'}</span>`;
      if (trueCard.def !== undefined) statsEl.innerHTML += `<span>🛡️ DEF ${trueCard.def ?? '?'}</span>`;
      if (trueCard.level)             statsEl.innerHTML += `<span>⭐ Niv.${trueCard.level}</span>`;
    }

    // Choices
    const choicesDiv = document.getElementById('choices');
    choicesDiv.innerHTML = '';
    choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn'; btn.textContent = c.name;
      btn.onclick = () => handleAnswer(btn, c.name, choicesDiv);
      choicesDiv.appendChild(btn);
    });

    hide('desc-load');
    show('desc-card', 'flex');
    show('choices', 'grid');
    show('timer-wrap');

    // Timer
    timeLeft = 60; updateTimerBar();
    timer = setInterval(() => {
      timeLeft--; updateTimerBar();
      if (timeLeft <= 0) {
        clearInterval(timer);
        if (!answered) {
          answered = true;
          revealAnswer(null, choicesDiv);
          showFlash('timeout', '⏰ Temps écoulé ! C\'était : ' + correctAnswer);
          bad++; streak = 0; renderHUD();
          document.getElementById('next-area').style.display = 'block';
        }
      }
    }, 1000);

  } catch(e) {
    document.getElementById('desc-load').textContent = '❌ Erreur — Réessaie.';
  }
}

function handleAnswer(btn, name, container) {
  if (answered) return;
  answered = true;
  clearInterval(timer);
  revealAnswer(btn, container);
  if (name === correctAnswer) {
    showFlash('correct', '✅ Bonne réponse !' + (streak >= 2 ? ' 🔥 ×' + (streak + 1) : ''));
    good++; streak++;
  } else {
    showFlash('wrong', '❌ Raté ! C\'était : ' + correctAnswer);
    bad++; streak = 0;
  }
  renderHUD();
  document.getElementById('next-area').style.display = 'block';
}

function revealAnswer(clickedBtn, container) {
  container.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === correctAnswer) b.classList.add('correct');
    else if (b === clickedBtn)           b.classList.add('wrong');
  });
}

nextRound();
</script>
</body>
</html>
