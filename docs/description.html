<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Description YGO — Atem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root { --black:#06050a; --ink:#131119; --gold:#d4a843; --gold-light:#f0c860; --silver:#8a8fa8; --white:#f0ecf5; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--black); color:var(--white); font-family:'Crimson Pro',serif; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 60% 50% at 50% 0%, rgba(122,58,138,0.15) 0%, transparent 70%); pointer-events:none; z-index:0; }
  nav { position:fixed; top:0; width:100%; z-index:100; padding:1.2rem 3rem; display:flex; align-items:center; justify-content:space-between; background:linear-gradient(to bottom,rgba(6,5,10,0.97) 0%,transparent 100%); border-bottom:1px solid rgba(212,168,67,0.1); backdrop-filter:blur(4px); }
  .nav-logo { font-family:'Cinzel',serif; font-weight:900; font-size:1.1rem; color:var(--gold); text-decoration:none; letter-spacing:0.2em; }
  .nav-back { font-family:'Cinzel',serif; font-size:0.7rem; color:var(--silver); text-decoration:none; letter-spacing:0.2em; text-transform:uppercase; transition:color 0.3s; }
  .nav-back:hover { color:var(--gold); }

  main { position:relative; z-index:1; max-width:680px; margin:0 auto; padding:8rem 2rem 5rem; display:flex; flex-direction:column; align-items:center; gap:1.8rem; }
  .game-title { font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:0.4em; color:var(--gold); text-transform:uppercase; }

  .score-bar { display:flex; gap:2rem; font-family:'Cinzel',serif; font-size:0.75rem; letter-spacing:0.2em; color:var(--silver); }
  .score-bar span { color:var(--gold-light); font-size:1.1rem; }

  .timer-bar-wrap { width:100%; height:4px; background:rgba(212,168,67,0.1); border-radius:2px; overflow:hidden; }
  .timer-bar { height:100%; background:var(--gold); transition:width 0.1s linear; width:100%; }
  .timer-bar.low { background:#c44020; }

  /* Description card */
  .desc-card {
    width:100%; background:var(--ink);
    border:1px solid rgba(212,168,67,0.15); padding:1.8rem;
    display:flex; flex-direction:column; gap:1rem;
  }
  .desc-meta { display:flex; gap:1rem; flex-wrap:wrap; }
  .meta-tag {
    font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase;
    padding:0.25rem 0.6rem; border:1px solid rgba(212,168,67,0.2); color:var(--gold);
  }
  .desc-text {
    font-size:1rem; line-height:1.7; color:rgba(240,236,245,0.85);
    font-style:italic;
    border-left:2px solid rgba(212,168,67,0.25); padding-left:1rem;
  }
  .desc-stats { display:flex; gap:1.5rem; font-size:0.85rem; color:var(--silver); }

  /* Choices */
  .choices { display:grid; grid-template-columns:1fr 1fr; gap:0.8rem; width:100%; }
  .choice-btn {
    padding:0.8rem 1rem; font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:0.1em;
    text-transform:uppercase; background:var(--ink); border:1px solid rgba(212,168,67,0.15);
    color:var(--silver); cursor:pointer; transition:all 0.2s; text-align:center; line-height:1.4;
  }
  .choice-btn:hover:not(:disabled) { background:rgba(212,168,67,0.08); color:var(--gold); border-color:rgba(212,168,67,0.35); }
  .choice-btn:disabled { cursor:default; }
  .choice-btn.correct { background:rgba(58,138,74,0.15); border-color:rgba(58,138,74,0.5); color:#6fc87d; }
  .choice-btn.wrong { background:rgba(196,64,32,0.1); border-color:rgba(196,64,32,0.4); color:#e07060; }

  .result-msg { font-family:'Cinzel',serif; font-size:0.95rem; letter-spacing:0.1em; text-align:center; padding:0.8rem 1.5rem; animation:fadeUp 0.3s forwards; }
  .result-msg.correct { color:#6fc87d; }
  .result-msg.wrong { color:#e07060; }
  .result-msg.timeout { color:var(--gold); }

  .btn { font-family:'Cinzel',serif; font-size:0.75rem; letter-spacing:0.25em; text-transform:uppercase; padding:0.9rem 2.2rem; border:1px solid; cursor:pointer; transition:all 0.3s; background:var(--gold); color:var(--black); border-color:var(--gold); text-decoration:none; display:inline-block; }
  .btn:hover { background:var(--gold-light); box-shadow:0 0 30px rgba(212,168,67,0.35); transform:translateY(-2px); }
  .btn-ghost { background:transparent; color:var(--silver); border-color:rgba(138,143,168,0.3); }
  .btn-ghost:hover { color:var(--white); border-color:var(--white); }

  .loading { font-style:italic; color:var(--silver); letter-spacing:0.15em; font-size:0.9rem; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
  @media (max-width:500px) { nav{padding:1rem 1.5rem;} main{padding:6rem 1rem 3rem;} .choices{grid-template-columns:1fr;} }
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="../index.html">𓂀 ATEM</a>
  <a class="nav-back" href="../minijeux.html">← Mini-jeux</a>
</nav>

<main>
  <p class="game-title">🧠 Devine la Description</p>

  <div class="score-bar">
    <div>✅ <span id="good">0</span></div>
    <div>❌ <span id="bad">0</span></div>
    <div>🔥 Streak <span id="streak">0</span></div>
  </div>

  <div id="loading" class="loading">Chargement…</div>

  <div class="timer-bar-wrap" id="timer-wrap" style="display:none">
    <div class="timer-bar" id="timer-bar"></div>
  </div>

  <div id="desc-card" class="desc-card" style="display:none">
    <div class="desc-meta">
      <span class="meta-tag" id="meta-type"></span>
      <span class="meta-tag" id="meta-arch" style="display:none"></span>
    </div>
    <p class="desc-text" id="desc-text"></p>
    <div class="desc-stats" id="desc-stats"></div>
  </div>

  <div id="choices" class="choices" style="display:none"></div>
  <div id="result-msg" class="result-msg" style="display:none"></div>

  <div id="next-btn" style="display:none">
    <button class="btn" onclick="nextRound()">Question suivante →</button>
  </div>
  <a class="btn btn-ghost" href="../minijeux.html">← Retour</a>
</main>

<script>
let score = { good:0, bad:0, streak:0 };
let timer = null;
let timeLeft = 60;
let answered = false;
let correctAnswer = '';

function normalize(str) {
  return str.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
}

function censorName(desc, name) {
  const re = new RegExp(name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  return desc.replace(re,'[cette carte]');
}

function getTypeGroup(type) {
  const t = type.toLowerCase();
  if (t.includes('monster') || t.includes('monstre')) return 'monstre';
  if (t.includes('spell') || t.includes('magie')) return 'magie';
  if (t.includes('trap') || t.includes('piège')) return 'piège';
  return 'autre';
}

async function nextRound() {
  clearInterval(timer);
  answered = false;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('desc-card').style.display = 'none';
  document.getElementById('choices').style.display = 'none';
  document.getElementById('result-msg').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('timer-wrap').style.display = 'none';

  try {
    const res = await fetch('https://db.ygoprodeck.com/api/v7/cardinfo.php?language=fr');
    const data = await res.json();
    const all = data.data || [];

    const sample = all.sort(() => Math.random()-0.5).slice(0, 150);
    const trueCard = sample.find(c => c.desc && c.name.length > 3);
    if (!trueCard) { document.getElementById('loading').textContent = '❌ Pas de carte valide. Réessaie.'; return; }

    correctAnswer = trueCard.name;
    const desc = censorName(trueCard.desc, trueCard.name);
    const typeGroup = getTypeGroup(trueCard.type || '');

    // wrongs — same type group if possible
    const sameGroup = all.filter(c => c.name !== trueCard.name && getTypeGroup(c.type||'') === typeGroup);
    const pool = sameGroup.length >= 3 ? sameGroup : all.filter(c => c.name !== trueCard.name);
    const wrongs = pool.sort(() => Math.random()-0.5).slice(0,3);
    const choices = [trueCard, ...wrongs].sort(() => Math.random()-0.5);

    // Display card info
    document.getElementById('meta-type').textContent = trueCard.type || 'Type inconnu';
    const archEl = document.getElementById('meta-arch');
    if (trueCard.archetype) {
      archEl.textContent = trueCard.archetype;
      archEl.style.display = 'inline-block';
    } else {
      archEl.style.display = 'none';
    }

    document.getElementById('desc-text').textContent = desc.length > 600 ? desc.slice(0,600)+'…' : desc;

    const statsEl = document.getElementById('desc-stats');
    statsEl.innerHTML = '';
    const isMonster = typeGroup === 'monstre';
    if (isMonster) {
      if (trueCard.atk !== undefined) statsEl.innerHTML += `<span>⚔️ ATK ${trueCard.atk ?? '?'}</span>`;
      if (trueCard.def !== undefined) statsEl.innerHTML += `<span>🛡️ DEF ${trueCard.def ?? '?'}</span>`;
      if (trueCard.level) statsEl.innerHTML += `<span>⭐ Niv.${trueCard.level}</span>`;
    }

    // choices
    const choicesDiv = document.getElementById('choices');
    choicesDiv.innerHTML = '';
    choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c.name;
      btn.onclick = () => handleAnswer(btn, c.name, choicesDiv);
      choicesDiv.appendChild(btn);
    });

    document.getElementById('loading').style.display = 'none';
    document.getElementById('desc-card').style.display = 'flex';
    document.getElementById('choices').style.display = 'grid';
    document.getElementById('timer-wrap').style.display = 'block';

    // timer
    timeLeft = 60;
    updateTimerBar();
    timer = setInterval(() => {
      timeLeft--;
      updateTimerBar();
      if (timeLeft <= 0) {
        clearInterval(timer);
        if (!answered) {
          answered = true;
          revealAnswer(null, choicesDiv);
          showResult('⏰ Temps écoulé ! C\'était : ' + correctAnswer, 'timeout');
          score.bad++; score.streak = 0; updateScore();
          document.getElementById('next-btn').style.display = 'block';
        }
      }
    }, 1000);

  } catch(e) {
    document.getElementById('loading').textContent = '❌ Erreur. Réessaie.';
  }
}

function updateTimerBar() {
  const bar = document.getElementById('timer-bar');
  bar.style.width = (timeLeft/60*100)+'%';
  bar.className = 'timer-bar' + (timeLeft<=10?' low':'');
}

function handleAnswer(btn, name, container) {
  if (answered) return;
  answered = true;
  clearInterval(timer);
  revealAnswer(btn, container);
  if (name === correctAnswer) {
    showResult('✅ Bonne réponse !','correct');
    score.good++; score.streak++;
  } else {
    showResult('❌ Raté ! C\'était : ' + correctAnswer, 'wrong');
    score.bad++; score.streak = 0;
  }
  updateScore();
  document.getElementById('next-btn').style.display = 'block';
}

function revealAnswer(clickedBtn, container) {
  container.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === correctAnswer) b.classList.add('correct');
    else if (b === clickedBtn) b.classList.add('wrong');
  });
}

function showResult(msg, type) {
  const el = document.getElementById('result-msg');
  el.textContent = msg; el.className = 'result-msg '+type; el.style.display = 'block';
}

function updateScore() {
  document.getElementById('good').textContent = score.good;
  document.getElementById('bad').textContent = score.bad;
  document.getElementById('streak').textContent = score.streak;
}

nextRound();
</script>
</body>
</html>
